<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!--Form-->
    <center>
    <form action="./HTMLCSS.html" style="border: 2px solid black; width: 50%; background-color: beige";>
       
        <h1>Login Registration</h1>
    <table border="1" cellpadding="8">
        <!--row1-->
        <tr>
            <td>
                <label for="">Full Name</label>
            </td>
            <td><input type="text"></td>
        </tr>

        <!--row2-->
        <tr>
            <td>
                <label for="">Email :</label>
            </td>
            <td><input type="email"></td>
        </tr>

        <!--row3-->
        <tr>
            <td>
                <label for="">Phone Number :</label>
            </td>
            <td><input type="number" style="width: 120px; height: 15px;"></td>
        </tr>

        <!--row4-->
        <tr>
            <td>
                <label for="">Gender :</label>
                <td>
             <input type="radio" name="gender">
       <label for="male">Male</label>

       <input type="radio" name="gender">
       <label for="female">Female</label>

       <input type="radio" name="gender">
       <label for="female">Female</label>
       </td>
        </tr>

       

        <!--row6-->
        <tr>
            <td>
                <label for="">Address :</label>
            </td>
            <td>
                <textarea name="address" rows="5" cols="30" placeholder="Enter your Address" required></textarea>
            </td>
        </tr>

      
            <td colspan="2" align="center">
                <button >Login</button>
            
            
            
            
                <button >Sign in</button>
            </td>
        </tr>
    </table>

    </center>
    </form>
